<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广西城市职业大学【空港校区】智能课表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 50%, #dbeafe 100%); color: #1e293b; min-height: 100vh; padding: 15px; }
        .max-w { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; padding-top: 10px; }
        h1 { font-size: 18px; color: #4f46e5; font-weight: 800; margin-bottom: 4px; }
        p { font-size: 12px; color: #64748b; }
        .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-main { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-sec { background: #e2e8f0; color: #334155; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; font-size: 12px; }
        th { background: #f1f5f9; color: #4f46e5; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="max-w">
        <header>
            <h1>广西城市职业大学【空港校区】</h1>
            <p>专属个人智能课表中心</p>
        </header>

        <div class="card">
            <h3 style="font-size: 15px; margin-bottom: 10px; color: #334155;">➕ 快速添加课程</h3>
            <input type="text" id="cName" placeholder="课程名称 (例如：高等数学)">
            <input type="text" id="cRoom" placeholder="上课地点 (例如：教学楼302)">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="cDay" placeholder="星期 (1-7)" style="flex:1;">
                <input type="text" id="cStart" placeholder="第几节 (1-8)" style="flex:1;">
            </div>
            <div class="btn-row">
                <button class="btn-main" onclick="addCourse()">保存并添加课程</button>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size: 15px; margin-bottom: 10px; color: #334155;">📅 我的课程表</h3>
            <div id="tableBox"></div>
        </div>
    </div>

    <script>
        let courses = JSON.parse(localStorage.getItem('MY_COURSES')) || [];

        function render() {
            const box = document.getElementById('tableBox');
            if (courses.length === 0) {
                box.innerHTML = '<p style="text-align:center; color:#94a3b8; padding:15px;">暂无课程，快在上方添加吧！</p>';
                return;
            }
            let html = `<table><tr><th>星期</th><th>节次</th><th>课程名称</th><th>地点</th></tr>`;
            courses.forEach(c => {
                html += `<tr><td>周${c.day}</td><td>第${c.start}节</td><td><b>${c.name}</b></td><td>${c.room || '-'}</td></tr>`;
            });
            html += `</table>`;
            box.innerHTML = html;
        }

        function addCourse() {
            const name = document.getElementById('cName').value.trim();
            const room = document.getElementById('cRoom').value.trim();
            const day = document.getElementById('cDay').value.trim();
            const start = document.getElementById('cStart').value.trim();

            if (!name) { alert('请输入课程名称！'); return; }
            
            courses.push({ name, room, day: day || '1', start: start || '1' });
            localStorage.setItem('MY_COURSES', JSON.stringify(courses));
            
            document.getElementById('cName').value = '';
            document.getElementById('cRoom').value = '';
            document.render = render();
            render();
            alert('添加成功！');
        }

        window.onload = render;
    </script>
</body>
</html>
