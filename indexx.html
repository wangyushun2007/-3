<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>广西城市职业大学【空港校区】智能课表</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; color: #1e293b; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        button { background: #4f46e5; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; font-size: 13px; }
        th { background: #f1f5f9; color: #4f46e5; }
    </style>
</head>
<body>

    <div class="card">
        <h2>广西城市职业大学课表</h2>
        <p style="font-size: 12px; color: #64748b;">系统运行正常！</p>
    </div>

    <div class="card">
        <h3>添加课程</h3>
        <input type="text" id="cName" placeholder="课程名称 (例如：高等数学)">
        <input type="text" id="cRoom" placeholder="上课地点">
        <button onclick="addCourse()">保存课程</button>
    </div>

    <div class="card">
        <h3>我的课表</h3>
        <div id="tableBox"></div>
    </div>

    <script>
        let courses = JSON.parse(localStorage.getItem('MY_COURSES')) || [];

        function render() {
            const box = document.getElementById('tableBox');
            if (courses.length === 0) {
                box.innerHTML = '<p style="text-align:center; color:#94a3b8;">暂无课程</p>';
                return;
            }
            let html = `<table><tr><th>名称</th><th>地点</th></tr>`;
            courses.forEach(c => {
                html += `<tr><td><b>${c.name}</b></td><td>${c.room || '-'}</td></tr>`;
            });
            html += `</table>`;
            box.innerHTML = html;
        }

        function addCourse() {
            const name = document.getElementById('cName').value.trim();
            const room = document.getElementById('cRoom').value.trim();
            if (!name) { alert('请输入课程名称！'); return; }
            courses.push({ name, room });
            localStorage.setItem('MY_COURSES', JSON.stringify(courses));
            document.getElementById('cName').value = '';
            document.getElementById('cRoom').value = '';
            render();
            alert('保存成功！');
        }

        render();
    </script>
</body>
</html>
